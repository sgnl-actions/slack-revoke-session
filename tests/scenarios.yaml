# Slack Revoke Session Test Scenarios
action:
  params:
    userEmail: user@example.com
  context:
    secrets:
      BEARER_AUTH_TOKEN: xoxb-test-token
    environment:
      ADDRESS: https://slack.com

scenarios:

  # ── success cases ─────────────────────────────────────────────────────────

  - name: successfully revoke user sessions
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-user-lookup.http
      - request:
          method: POST
          url: https://slack.com/api/admin.users.session.reset
        fixture: fixtures/200-session-reset-success.http
    invoke:
      returns:
        userEmail: user@example.com
        userId: U123456
        sessionsRevoked: true

  # ── lookup ────────────────────────────────────────────────────────────────

  - name: user not found
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-users-not-found.http
    invoke:
      throws: "User not found with email"

  - name: not allowed token type on session reset
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-user-lookup.http
      - request:
          method: POST
          url: https://slack.com/api/admin.users.session.reset
        fixture: fixtures/200-not-allowed-token-type.http
    invoke:
      throws: "Slack API error: not_allowed_token_type"

  # ── API error scenarios ───────────────────────────────────────────────────

  - name: invalid auth during user lookup
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-invalid-auth.http
    invoke:
      throws: "Invalid or missing authentication token"

  - name: invalid auth during session reset
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-user-lookup.http
      - request:
          method: POST
          url: https://slack.com/api/admin.users.session.reset
        fixture: fixtures/200-invalid-auth.http
    invoke:
      throws: "Invalid or missing authentication token"

  - name: malformed JSON during user lookup
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-invalid-json.http
    invoke:
      throws: "Slack API error: invalid_json"

  - name: malformed JSON during session reset
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-user-lookup.http
      - request:
          method: POST
          url: https://slack.com/api/admin.users.session.reset
        fixture: fixtures/200-invalid-json.http
    invoke:
      throws: "Slack API error: invalid_json"

  - name: invalid form data during user lookup
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-invalid-form-data.http
    invoke:
      throws: "Slack API error: invalid_form_data"

  - name: invalid form data during session reset
    steps:
      - request:
          method: GET
          url: https://slack.com/api/users.lookupByEmail?email=user%40example.com
        fixture: fixtures/200-user-lookup.http
      - request:
          method: POST
          url: https://slack.com/api/admin.users.session.reset
        fixture: fixtures/200-invalid-form-data.http
    invoke:
      throws: "Slack API error: invalid_form_data"

  # ── input validation ──────────────────────────────────────────────────────

  - name: missing userEmail
    params:
      userEmail: ~
    steps: []
    invoke:
      throws: "Invalid or missing userEmail parameter"

  - name: invalid email format
    params:
      userEmail: not-an-email
    steps: []
    invoke:
      throws: "Invalid email format"

  - name: missing auth token
    context:
      secrets:
        BEARER_AUTH_TOKEN: ~
    steps: []
    invoke:
      throws: "No authentication configured"